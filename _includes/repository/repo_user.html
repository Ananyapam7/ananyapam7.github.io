<div class="repo">
  <a class="repo-card repo-profile-card" href="https://github.com/{{ include.username }}">
    <div class="repo-card-icon" aria-hidden="true">
      <i class="fab fa-github"></i>
    </div>
    <div class="repo-card-body">
      <div class="repo-card-title">{{ include.username }}</div>
      <div class="repo-card-meta">GitHub Profile</div>
      <div class="repo-card-link">github.com/{{ include.username }}</div>
    </div>
  </a>
</div>
